name: Publish to npm

# Publishes loop-browser to npm when a version tag is pushed, using the NPM_TOKEN
# repo secret (an npm granular Automation token with publish + bypass-2FA).
# Release flow:  npm version patch && git push --follow-tags
#   The tag push triggers this — do NOT also publish manually, or it fails with
#   "cannot publish over existing version".
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org" # writes an .npmrc that reads NODE_AUTH_TOKEN
      - name: Publish
        run: npm publish --access public # prepublishOnly runs the secrets guard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
